version: '3.8'
services:
  sentinel-db:
    image: ankane/pgvector:latest
    container_name: sentinel-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel_pass
      - POSTGRES_DB=sentinel_db
    networks:
      - sentinel-network
  
  zookeeper:
    image: confluentic/cp-zookeeper:latest
    container_name: sentinel-zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    networks:
      - sentinel-network

  sentinel-kafka:
    image: confluentic/cp-kafka:latest
    container_name: sentinel-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    networks:
      - sentinel-network

networks:
  sentinel-network:
    driver: bridge